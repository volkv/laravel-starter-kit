services:

    nginx-base:
        image: laravel-starter-kit-nginx-base
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile.base

    php-fpm:
        image: laravel-starter-kit-php-fpm
        build: ./docker/php-fpm
        restart: unless-stopped
        user: "1000:1000"
        depends_on:
            - sql
            - redis
        volumes:
            - ./:/var/www
            - ./docker/volume/php/log:/var/log/php
            - /var/www/.git
            - /var/www/.idea

    nginx:
        build:
            context: ./docker/nginx
        restart: unless-stopped
        depends_on:
            - php-fpm
        volumes:
            - ./:/var/www
            - ./docker/volume/nginx/logs:/var/log/nginx

    sql:
        image: postgres:18.3
        restart: unless-stopped
        volumes:
            # 18+ images keep data in a version-scoped subdirectory of
            # /var/lib/postgresql — mounting the parent enables pg_upgrade
            - pgdata:/var/lib/postgresql
            - ./docker/volume/postgres:/backups
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}

    redis:
        image: redis:8-alpine
        restart: unless-stopped

volumes:
    pgdata:
